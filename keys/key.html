<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CAFFE MC - Key Shop</title>

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
<link rel="stylesheet" href="key.css">

</head>
<body>

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<nav class="navbar">
<a href="../index.html" class="back-btn">← Back</a>

<button class="cart-btn" onclick="openOrder()">
🛒 Cart (<span id="cartCount">0</span>)
</button>
</nav>

<!-- IMAGE POPUP -->

<div class="img-popup" id="imgPopup" onclick="closeImg(event)">
<div class="image-box">
<div class="close-video" onclick="closeImage()">×</div>
<img id="popupImage" src="">
</div>
</div>

<!-- ORDER POPUP -->

<div class="order-popup" id="orderPopup">
<div class="order-box">

<div class="close-btn" onclick="closeOrder()">×</div>

<h2>ORDER CHECKOUT</h2>

<img src="../img/qr.png" class="qr">

<p class="qr-name">PISETH YOUN</p>

<a href="../img/qr.png" download="PISETH-YOUN-QR.png" class="download-qr">
Download QR
</a>

<div class="cart-list" id="cartList"></div>

<div class="input-box">
<input type="text" id="username" placeholder="Minecraft Username">
</div>

<div class="edition-box">
<div class="ed-btn active" onclick="selectEdition('Java', this)">Java</div>
<div class="ed-btn" onclick="selectEdition('Bedrock', this)">Bedrock</div>
</div>

<input type="file" id="proofUpload" accept="image/*">

<button class="submit-btn" onclick="submitOrder()">
Submit Order
</button>

<p id="status"></p>

</div>
</div>

<!-- KEYS -->

<section class="key-section">

<div class="key-card">
<img src="../img/ultkey.png">

<div>
<h2>UTL KEY</h2>
<p class="price">$0.99</p>
</div>

<div class="btns">
<button class="buy" onclick="addToCart('UTL KEY')">Add to Cart</button>
<button class="view" onclick="openImage('../img/ultimatekey.png')">Preview</button>
</div>
</div>

<div class="key-card">
<img src="../img/hotllate.png">

<div>
<h2>HOTLATTE KEY</h2>
<p class="price">$0.49</p>
</div>

<div class="btns">
<button class="buy" onclick="addToCart('HOTLATTE KEY')">Add to Cart</button>
<button class="view" onclick="openImage('../img/hotkey.png')">Preview</button>
</div>
</div>

<div class="key-card">
<img src="../img/123123.png">

<div>
<h2>CAPPUCINO KEY</h2>
<p class="price">$0.25</p>
</div>

<div class="btns">
<button class="buy" onclick="addToCart('CAPPUCINO KEY')">Add to Cart</button>
<button class="view" onclick="openImage('../img/capukey.png')">Preview</button>
</div>
</div>

</section>

<script src="key.js"></script>

</body>
</html>
