<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CAFFE MC - Kit Shop</title>

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
<link rel="stylesheet" href="kit.css">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

</head>

<body data-shop="KIT">

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<nav class="navbar">

<a href="../index.html" class="back-btn">
← Back
</a>

<div class="cart-area">

<button class="cart-btn" onclick="openOrder()">
🛒 Cart (<span id="cartCount" class="cart-count">0</span>)
</button>

</div>

</nav>

<button class="checkout-top-btn"
id="checkoutTopBtn"
onclick="openOrder()">
🛒 Check Order
</button>

<!-- VIDEO POPUP -->

<div class="img-popup"
id="imgPopup"
onclick="closeImg(event)">

<div class="video-box">

<div class="close-video"
onclick="closeVideo()">×</div>

<video id="popupVideo" controls autoplay>
<source id="videoSrc" src="" type="video/mp4">
</video>

</div>
</div>

<!-- ORDER POPUP -->

<div class="order-popup" id="orderPopup">

<div class="order-box">

<div class="close-btn" onclick="closeOrder()">×</div>

<h2>ORDER CHECKOUT</h2>

<img src="../img/qr.png" class="qr" alt="QR">

<p class="qr-name">PISETH YOUN</p>

<a href="../img/qr.png"
download="PISETH-YOUN-QR.png"
class="download-qr">
Download QR
</a>

<div class="cart-list" id="cartList">

<p style="text-align:center;opacity:.7;">
Cart is empty
</p>

</div>

<div class="input-box">

<input
type="text"
id="username"
placeholder="Minecraft Username">

</div>

<div class="edition-box">

<div class="ed-btn active"
onclick="selectEdition('Java', this)">
Java
</div>

<div class="ed-btn"
onclick="selectEdition('Bedrock', this)">
Bedrock
</div>

</div>

<input
type="file"
id="proofUpload"
accept="image/png,image/jpeg,image/webp">

<div
class="cf-turnstile"
data-sitekey="0x4AAAAAADRqeHYqMi58wtlC">
</div>

<button
class="submit-btn"
onclick="submitOrder()">
Submit Order
</button>

<p id="status"></p>

</div>
</div>

<!-- KITS -->

<section class="kit-section">

<!-- AMERICANO -->

<div class="kit-card" data-kit="AMERICANO - $0.99">

<img src="../img/kit3.png" alt="AMERICANO">

<div>

<h2>AMERICANO</h2>

<p class="price">$0.99</p>

</div>

<div class="btns">

<button class="buy"
onclick="addToCart('AMERICANO - $0.99', this)">
Add to Cart
</button>

<button class="view"
onclick="openVideo('../img/video.mp4')">
Preview
</button>

</div>
</div>

<!-- CAPPUCINO -->

<div class="kit-card" data-kit="CAPPUCINO - $1.99">

<img src="../img/kit4.png" alt="CAPPUCINO">

<div>

<h2>CAPPUCINO</h2>

<p class="price">$1.99</p>

</div>

<div class="btns">

<button class="buy"
onclick="addToCart('CAPPUCINO - $1.99', this)">
Add to Cart
</button>

<button class="view"
onclick="openVideo('../img/capuchino.mp4')">
Preview
</button>

</div>
</div>

<!-- HOTLATTE -->

<div class="kit-card" data-kit="HOTLATTE - $2.99">

<img src="../img/kit2.png" alt="HOTLATTE">

<div>

<h2>HOTLATTE</h2>

<p class="price">$2.99</p>

</div>

<div class="btns">

<button class="buy"
onclick="addToCart('HOTLATTE - $2.99', this)">
Add to Cart
</button>

<button class="view"
onclick="openVideo('../img/hotlate.mp4')">
Preview
</button>

</div>
</div>

<!-- EXPRESSO -->

<div class="kit-card" data-kit="EXPRESSO - $3.99">

<img src="../img/kit6.png" alt="EXPRESSO">

<div>

<h2>EXPRESSO</h2>

<p class="price">$3.99</p>

</div>

<div class="btns">

<button class="buy"
onclick="addToCart('EXPRESSO - $3.99', this)">
Add to Cart
</button>

<button class="view"
onclick="openVideo('../img/expres.mp4')">
Preview
</button>

</div>
</div>

<!-- ULTRA CAFFE -->

<div class="kit-card" data-kit="ULTRA CAFFE - $4.99">

<img src="../img/kit1.png" alt="ULTRA CAFFE">

<div>

<h2>ULTRA CAFFE</h2>

<p class="price">$4.99</p>

</div>

<div class="btns">

<button class="buy"
onclick="addToCart('ULTRA CAFFE - $4.99', this)">
Add to Cart
</button>

<button class="view"
onclick="openVideo('../img/ultracaffe.mp4')">
Preview
</button>

</div>
</div>

</section>

<script src="../shop.js"></script>

</body>
</html>
